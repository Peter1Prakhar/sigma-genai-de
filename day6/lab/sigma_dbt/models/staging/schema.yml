version: 2

sources:
  - name: sigma_analytics
    description: "Raw Sigma DataTech analytics tables in Snowflake."
    database: SIGMA_DE
    schema: PUBLIC
    tables:
      - name: fact_transactions
        description: "Raw payment transaction facts."
        columns:
          - name: transaction_id
            description: "Primary key for each transaction."
            tests:
              - not_null
              - unique
          - name: amount
            description: "Transaction amount in USD."
          - name: status
            description: "Transaction status: COMPLETED, FAILED, or PENDING."
            tests:
              - not_null
              - accepted_values:
                  values: ['COMPLETED', 'FAILED', 'PENDING']
          - name: merchant_id
            description: "Merchant foreign key."
            tests:
              - not_null
          - name: customer_id
            description: "Customer foreign key."
          - name: transaction_date
            description: "Date the transaction occurred."
          - name: payment_method
            description: "Payment method used for the transaction."
            tests:
              - accepted_values:
                  values: ['CREDIT_CARD', 'DEBIT_CARD', 'UPI']
      - name: dim_merchant
        description: "Merchant dimension table."
        columns:
          - name: merchant_id
            description: "Primary key for each merchant."
            tests:
              - not_null
              - unique
          - name: merchant_name
            description: "Merchant display name."
          - name: category
            description: "Merchant business category."
          - name: city
            description: "Merchant city."
          - name: onboarded_date
            description: "Date the merchant was onboarded."
      - name: dim_customer
        description: "Customer dimension table."
        columns:
          - name: customer_id
            description: "Primary key for each customer."
            tests:
              - not_null
              - unique
          - name: customer_name
            description: "Customer display name."
          - name: email
            description: "Customer email address."
          - name: tier
            description: "Customer tier."
            tests:
              - accepted_values:
                  values: ['GOLD', 'SILVER', 'BRONZE']
          - name: signup_date
            description: "Date the customer signed up."
          - name: city
            description: "Customer city."

models:
  - name: stg_transactions
    description: "Cleaned transaction facts with typed columns and test merchants removed."
    columns:
      - name: transaction_id
        description: "Primary key for each transaction."
        tests:
          - not_null
          - unique
      - name: amount
        description: "Transaction amount in USD."
        tests:
          - not_null
      - name: status
        description: "Transaction status: COMPLETED, FAILED, or PENDING."
        tests:
          - not_null
          - accepted_values:
              values: ['COMPLETED', 'FAILED', 'PENDING']
      - name: merchant_id
        description: "Merchant foreign key."
        tests:
          - not_null
          - relationships:
              to: source('sigma_analytics', 'dim_merchant')
              field: merchant_id
      - name: customer_id
        description: "Customer foreign key."
        tests:
          - relationships:
              to: source('sigma_analytics', 'dim_customer')
              field: customer_id
      - name: transaction_date
        description: "Date the transaction occurred."
        tests:
          - not_null
      - name: payment_method
        description: "Payment method used for the transaction."
        tests:
          - accepted_values:
              values: ['CREDIT_CARD', 'DEBIT_CARD', 'UPI']
      - name: loaded_at
        description: "Timestamp when the staging row was processed."
        tests:
          - not_null
